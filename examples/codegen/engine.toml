listen_address  = "0.0.0.0:9100"
manager_address = "http://127.0.0.1:9000"

[node]
proxy_address = "http://127.0.0.1:9001"

[database]
url             = "postgres://user:pass@localhost:5432/codegen"
max_connections = 20

[blobstore]
endpoint          = "http://127.0.0.1:8900"
access_key_id     = "rustfsadmin"
secret_access_key = "rustfsadmin"

[llm]
provider         = "anthropic"
api_key_env      = "ANTHROPIC_API_KEY"
max_tokens_limit = 8192

[pool]
max_memory_size = 10485760

[[module]]
name        = "collector"
namespace   = "codegen"
version     = "1.0.0"
wasm_path   = "examples/codegen/collector/target/wasm32-wasip2/release/collector.wasm"
schema_path = "examples/codegen/schemas/collector.binpb"
blobstore   = true
fs          = "tempdir"
request_timeout_secs = 120

[[module]]
name        = "agent"
namespace   = "codegen"
version     = "1.0.0"
wasm_path   = "examples/codegen/agent/target/wasm32-wasip2/release/agent.wasm"
schema_path = "examples/codegen/schemas/agent.binpb"
database    = true
blobstore   = true
llm         = true
fs          = "tempdir"
migrations_path = "examples/codegen/agent/migrations"
request_timeout_secs = 300

[[module]]
name        = "coordinator"
namespace   = "codegen"
version     = "1.0.0"
wasm_path   = "examples/codegen/coordinator/target/wasm32-wasip2/release/coordinator.wasm"
schema_path = "examples/codegen/schemas/coordinator.binpb"
database    = true
migrations_path = "examples/codegen/coordinator/migrations"
request_timeout_secs = 600
