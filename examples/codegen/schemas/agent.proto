syntax = "proto3";
package codegen;

import "common.proto";

service AgentService {
  rpc RunTask    (RunTaskRequest)    returns (RunTaskResponse);
  rpc GetSession (GetSessionRequest) returns (GetSessionResponse);
}

message RunTaskRequest {
  string          session_id       = 1;
  string          task_description = 2;
  repeated string doc_prefixes     = 3;
  uint32          max_turns        = 4;  // 0 means default 3
}

message RunTaskResponse {
  string session_id    = 1;
  string unified_diff  = 2;
  uint32 turns_used    = 3;
  uint32 input_tokens  = 4;
  uint32 output_tokens = 5;
  AgentRunStatus status = 6;
  string message       = 7;
}

message GetSessionRequest {
  string session_id = 1;
}

message ConversationTurn {
  uint32 turn_number       = 1;
  string user_prompt       = 2;
  string assistant_response = 3;
  uint32 input_tokens      = 4;
  uint32 output_tokens     = 5;
}

message GetSessionResponse {
  string                   session_id  = 1;
  uint32                   turn_count  = 2;
  string                   latest_diff = 3;
  SessionStatus            status      = 4;
  repeated ConversationTurn turns      = 5;
}
