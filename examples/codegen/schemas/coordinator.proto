syntax = "proto3";
package codegen;

import "common.proto";

service CoordinatorService {
  rpc CreateTask  (CreateTaskRequest)  returns (CreateTaskResponse);
  rpc GetTask     (GetTaskRequest)     returns (GetTaskResponse);
  rpc ListTasks   (ListTasksRequest)   returns (ListTasksResponse);

  // Worker lifecycle RPCs for task status updates and completion.
  rpc ClaimTask        (ClaimTaskRequest)        returns (ClaimTaskResponse);
  rpc UpdateTaskStatus (UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);
  rpc CompleteTask     (CompleteTaskRequest)      returns (CompleteTaskResponse);
}

message DocSourceSpec {
  DocSourceType source_type = 1;
  string owner       = 2;
  string repo        = 3;
  string ref_or_ver  = 4;
}

message CreateTaskRequest {
  string                repo_url         = 1;
  string                ref              = 2;
  repeated DocSourceSpec doc_sources     = 3;
  string                task_description = 4;
  uint32                max_agent_turns  = 5;  // 0 means default 3
}

message CreateTaskResponse {
  string task_id = 1;
  TaskStatus status = 2;
}

message GetTaskRequest {
  string task_id = 1;
}

message GetTaskResponse {
  string task_id              = 1;
  TaskStatus status           = 2;
  string unified_diff         = 3;
  string message              = 4;
  uint32 agent_turns          = 5;
  uint32 total_input_tokens   = 6;
  uint32 total_output_tokens  = 7;
  string created_at           = 8;
  string updated_at           = 9;
}

message ListTasksRequest {
  uint32 limit  = 1;
  uint32 offset = 2;
}

message ListTasksResponse {
  repeated GetTaskResponse tasks = 1;
}

// ── Worker RPCs ─────────────────────────────────────────────────────────────

message ClaimTaskRequest {}

message ClaimTaskResponse {
  bool                   found            = 1;
  string                 task_id          = 2;
  string                 session_id       = 3;
  string                 repo_url         = 4;
  string                 ref              = 5;
  repeated DocSourceSpec doc_sources      = 6;
  string                 task_description = 7;
  uint32                 max_agent_turns  = 8;
}

message UpdateTaskStatusRequest {
  string task_id = 1;
  TaskStatus status = 2;
}

message UpdateTaskStatusResponse {}

message CompleteTaskRequest {
  string task_id              = 1;
  TaskStatus status           = 2;
  string unified_diff         = 3;
  string message              = 4;
  uint32 agent_turns          = 5;
  uint32 total_input_tokens   = 6;
  uint32 total_output_tokens  = 7;
}

message CompleteTaskResponse {}
