listen_address = "127.0.0.1:9200"

[node]
proxy_address   = "http://127.0.0.1:9001"
control_address = "http://127.0.0.1:9002"
peer_port       = 9443

[node.tls]
cert_path    = "certs/127.0.0.1.crt"
key_path     = "certs/127.0.0.1.key"
ca_cert_path = "certs/ca.crt"

# Three instances of the same client module — the engine ModuleRegistry
# round-robins Run requests across local WASM instances.
[[module]]
name        = "client"
namespace   = "ecommerce"
version     = "1.0.0"
wasm_path   = "examples/ecommerce/client/target/wasm32-wasip2/debug/client.wasm"
schema_path = "examples/ecommerce/schemas/client.binpb"

[[module]]
name        = "client"
