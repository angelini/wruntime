listen_address = "0.0.0.0:9200"

[node]
proxy_address   = "http://127.0.0.1:9001"
control_address = "http://127.0.0.1:9002"

# Three instances of the same client module — the proxy load-balances Run requests
# across all three, so concurrent callers each land on a different WASM instance.
[[module]]
name        = "client"
namespace   = "ecommerce"
version     = "1.0.0"
wasm_path   = "examples/ecommerce/client/target/wasm32-wasip2/release/client.wasm"
schema_path = "examples/ecommerce/schemas/client.binpb"

[[module]]
name        = "client"
namespace   = "ecommerce"
version     = "1.0.0"
wasm_path   = "examples/ecommerce/client/target/wasm32-wasip2/release/client.wasm"
schema_path = "examples/ecommerce/schemas/client.binpb"

