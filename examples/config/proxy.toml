listen_address  = "0.0.0.0:9001"
manager_address = "http://127.0.0.1:9000"

[node]
proxy_address = "http://127.0.0.1:9001"   # this proxy's own address, as reachable by peers

[cache]
routing_table_ttl_secs = 1
schema_ttl_secs        = 60

[metrics]
flush_interval_secs = 10
queue_depth         = 1000

# Circuit breaker — protects downstream engines from overload.
# Each engine address gets its own independent breaker; one open circuit
# does not affect routing to the other engines.
# All fields are optional; the values below are the defaults.
#
# [circuit_breaker]
# failure_threshold  = 5   # consecutive failures (5xx / 429 / network error) before opening
# open_duration_secs = 30  # seconds the breaker stays open before probing again

# Optional: expose a subset of routes to external callers on a separate port.
# All x-wr-* headers are stripped from incoming requests before routing.
#
# [external]
# listen_address = "0.0.0.0:8080"
#
# [[external.route]]
# path      = "/items"
# methods   = ["GET", "POST"]
# module    = "inventory"
# namespace = "ecommerce"
#
# [[external.route]]
# path      = "/items/{id}"
# methods   = ["GET"]
# module    = "inventory"
# namespace = "ecommerce"
