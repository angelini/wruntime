listen_address  = "127.0.0.1:9001"
control_address = "127.0.0.1:9002"

[node]
proxy_address = "http://127.0.0.1:9001"
peer_port     = 9443

[node.tls]
cert_path    = "certs/127.0.0.1.crt"
key_path     = "certs/127.0.0.1.key"
ca_cert_path = "certs/ca.crt"

[database]
url = "postgres://postgres@localhost:5433/wruntime_example"

[cache]
routing_table_ttl_secs = 1

# Circuit breaker — protects downstream engines from overload.
# Each engine address gets its own independent breaker; one open circuit
# does not affect routing to the other engines.
# All fields are optional; the values below are the defaults.
#
# [circuit_breaker]
# failure_threshold  = 5   # consecutive failures (5xx / 429 / network error) before opening
# open_duration_secs = 30  # seconds the breaker stays open before probing again

# Optional: allow WASM modules to make HTTP calls to external domains (egress).
# Without this section all outbound calls to non-module hosts are blocked (503).
# Wildcard '*' matches exactly one DNS label:
#   *.openai.com  →  api.openai.com ✓   openai.com ✗   a.b.openai.com ✗
#
# [egress]
# allowed_domains = ["*.openai.com", "api.github.com"]

# Optional: expose a subset of routes to external callers on a separate port.
# All x-wr-* headers are stripped from incoming requests before routing.
#
# [external]
# listen_address = "0.0.0.0:8080"
#
# [[external.route]]
# path      = "/items"
# methods   = ["GET", "POST"]
# module    = "inventory"
# namespace = "ecommerce"
#
# [[external.route]]
# path      = "/items/{id}"
# methods   = ["GET"]
# module    = "inventory"
# namespace = "ecommerce"
