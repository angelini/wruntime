listen_address = "0.0.0.0:9100"

[node]
proxy_address   = "http://127.0.0.1:9001"  # local proxy; used to rewrite WASM outbound calls
control_address = "http://127.0.0.1:9002"  # proxy gRPC control plane for registration/heartbeats

# Optional — remove this section if no modules need database access.
[database]
url             = "postgres://postgres@localhost:5433/wruntime_example"
max_connections = 20   # default pool size for all DB-enabled modules

# Optional — remove this section if no modules need LLM inference.
# [llm]
# provider         = "anthropic"
# api_key_env      = "ANTHROPIC_API_KEY"   # env var read at startup
# base_url         = "https://api.anthropic.com"  # default
# max_tokens_limit = 8192                  # host-enforced ceiling

# Optional — remove this section to use the default on-demand allocator.
[pool]
total_component_instances = 1000   # max concurrent WASM instances across all modules
max_memory_size = 10485760         # 10 MiB per instance linear memory

[[module]]
name        = "order-service"
namespace   = "payments"
version     = "1.0.0"
wasm_path   = "modules/order_service.wasm"
schema_path = "schemas/order_service.binpb"   # required: compiled FileDescriptorSet
database    = true                             # opt in to the shared connection pool
# db_max_connections = 10   # override pool size for this module (default: [database].max_connections)
# channel_capacity   = 256  # inbound request queue depth before 429 (default: 128)

[[module]]
name        = "inventory-service"
namespace   = "payments"
version     = "1.0.0"
wasm_path   = "modules/inventory_service.wasm"
schema_path = "schemas/inventory_service.binpb"
