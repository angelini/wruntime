listen_address  = "0.0.0.0:9003"
control_address = "0.0.0.0:9004"

[node]
proxy_address = "http://127.0.0.1:9003" # this proxy's own address, as reachable by peers
peer_port = 9443

[node.tls]
cert_path    = "certs/127.0.0.1.crt"
key_path     = "certs/127.0.0.1.key"
ca_cert_path = "certs/ca.crt"

[database]
url = "postgres://postgres@localhost:5433/wruntime_example"

[cache]
routing_table_ttl_secs = 5
