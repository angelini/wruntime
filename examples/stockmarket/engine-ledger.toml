listen_address = "0.0.0.0:9101"

[node]
proxy_address   = "http://127.0.0.1:9001"
control_address = "http://127.0.0.1:9002"
peer_port       = 9443

[node.tls]
cert_path    = "certs/127.0.0.1.crt"
key_path     = "certs/127.0.0.1.key"
ca_cert_path = "certs/ca.crt"

[database]
url             = "postgres://user:pass@localhost:5432/stockmarket"
max_connections = 100

[blobstore]
endpoint          = "http://127.0.0.1:8900"
access_key_id     = "rustfsadmin"
secret_access_key = "rustfsadmin"

[[module]]
name            = "ledger"
namespace       = "stockmarket"
version         = "1.0.0"
wasm_path       = "examples/stockmarket/ledger/target/wasm32-wasip2/release/ledger.wasm"
schema_path     = "examples/stockmarket/schemas/ledger.binpb"
database        = true
blobstore       = true
migrations_path = "examples/stockmarket/ledger/migrations"
