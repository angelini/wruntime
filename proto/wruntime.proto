syntax = "proto3";
package wruntime;

// ── Shared messages ───────────────────────────────────────────────────────

message ModuleDescriptor {
  string name         = 1;
  string version      = 2;
  bytes  proto_schema = 3; // serialised FileDescriptorSet for this module's API
  string namespace    = 4; // mandatory — e.g. "payments"
}

message EngineRegistration {
  string                    engine_id     = 1;
  string                    address       = 2; // host:port wr-proxy uses to reach this engine
  repeated ModuleDescriptor modules       = 3;
  string                    proxy_address = 4; // local proxy address (node identity)
  repeated SecretRequest    secrets       = 5; // secrets this engine needs (resolved from config)
  string                    peer_address  = 6; // mTLS peer address (https://host:peer_port)
  repeated string           db_namespaces = 7; // namespaces that need DB access
}

message RoutingRule {
  string rule_id                   = 1;
  string source_module             = 2;
  string destination_module        = 3;
  string engine_id                 = 4;
  string engine_address            = 5;
  string destination_version       = 6; // semver string, e.g. "1.2.0"
  bool   healthy                   = 7; // set by manager; false means no traffic
  string source_namespace          = 8;
  string destination_namespace     = 9;
  reserved 10;
  reserved "proxy_address";
  string peer_address              = 11; // sole cross-node forwarding address (required, non-empty)
}

message RoutingTable {
  repeated RoutingRule rules   = 1;
  uint64               version = 2; // incremented on every write
}

// ── Engine lifecycle ──────────────────────────────────────────────────────

message RegisterEngineRequest    { EngineRegistration registration = 1; }
message RegisterEngineResponse   {
  bool                              accepted       = 1;
  repeated NamespaceSecrets         secrets        = 2; // only the requested secrets, decrypted
  repeated NamespaceDbCredential    db_credentials = 3; // per-namespace DB role + password
}
message DeregisterEngineRequest  { string engine_id = 1; }
message DeregisterEngineResponse {}
message HeartbeatRequest {
  string                    engine_id       = 1;
  repeated ModuleDescriptor healthy_modules = 2; // modules the engine considers healthy
}
message HeartbeatResponse        {}
message ListEnginesRequest       {}
message ListEnginesResponse      { repeated EngineRegistration engines = 1; }

// ── Routing table ─────────────────────────────────────────────────────────

message GetRoutingTableRequest    {
  uint64 known_version = 1; // if set and matches current version, server returns no table
}
message GetRoutingTableResponse   { RoutingTable table = 1; }
message UpsertRoutingRuleResponse {}
message DeleteRoutingRuleRequest  { string rule_id = 1; }
message DeleteRoutingRuleResponse {}

// ── Database credentials ──────────────────────────────────────────────────

message NamespaceDbCredential {
  string namespace = 1;
  string role      = 2;  // e.g. "wr_ns_ecommerce"
  string password  = 3;
}

// ── Secrets ───────────────────────────────────────────────────────────────

message SecretRequest {
  string namespace = 1;
  string key       = 2;
}

message NamespaceSecrets {
  string              namespace = 1;
  map<string, string> secrets   = 2; // key → plaintext value
}

message SetSecretRequest    { string namespace = 1; string key = 2; string value = 3; }
message SetSecretResponse   {}
message DeleteSecretRequest { string namespace = 1; string key = 2; }
message DeleteSecretResponse{}
message ListSecretsRequest  { string namespace = 1; } // empty = all namespaces
message SecretEntry         { string namespace = 1; string key = 2; }
message ListSecretsResponse { repeated SecretEntry secrets = 1; }

// ── Manager discovery ─────────────────────────────────────────────────────

message ListManagersRequest  {}
message ManagerInfo          { string manager_id = 1; string grpc_address = 2; string gossip_address = 3; }
message ListManagersResponse { repeated ManagerInfo managers = 1; }

// ── Schemas ───────────────────────────────────────────────────────────────

message GetSchemaRequest    { string module = 1; string version = 2; string namespace = 3; }
message GetSchemaResponse   { bytes proto_schema = 1; }

// ── Worker job queue ──────────────────────────────────────────────────────

message SubmitJobRequest {
  string worker_namespace = 1;
  string worker_name      = 2;
  string worker_version   = 3;
  string job_type         = 4;
  bytes  payload          = 5;
  int32  timeout_secs     = 6;
  int32  max_attempts     = 7;
}

message SubmitJobResponse {
  string job_id = 1;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  string job_id        = 1;
  string status        = 2;
  bytes  result        = 3;
  string error_message = 4;
  int32  attempt       = 5;
  int32  max_attempts  = 6;
}

// ── Schedules ────────────────────────────────────────────────────────────

message Schedule {
  string schedule_id       = 1;
  string worker_namespace  = 2;
  string worker_name       = 3;
  string worker_version    = 4;
  string job_type          = 5;
  int32  interval_secs     = 6;
  bool   immediate         = 7;
  bytes  payload           = 8;
  int32  timeout_secs      = 9;
  int32  max_attempts      = 10;
  bool   enabled           = 11;
  string last_fired_at     = 12; // RFC 3339 or empty
  string next_fire_at         = 13; // RFC 3339 or empty
  string last_error           = 14;
  int32  consecutive_failures = 15;
}

message UpsertScheduleRequest {
  string worker_namespace  = 1;
  string worker_name       = 2;
  string worker_version    = 3;
  string job_type          = 4;
  int32  interval_secs     = 5;
  bool   immediate         = 6;
  bytes  payload           = 7;
  int32  timeout_secs      = 8;
  int32  max_attempts      = 9;
}

message UpsertScheduleResponse { string schedule_id = 1; }

message DeleteScheduleRequest {
  string worker_namespace = 1;
  string worker_name      = 2;
  string worker_version   = 3;
  string job_type         = 4;
}

message DeleteScheduleResponse {}

message ListSchedulesRequest  { string worker_namespace = 1; }
message ListSchedulesResponse { repeated Schedule schedules = 1; }

// ── NodeService ──────────────────────────────────────────────────────────
// Local gRPC service exposed by wr-proxy for engines on the same node.
// Engines use this instead of connecting directly to wr-manager.

service NodeService {
  rpc RegisterEngine   (RegisterEngineRequest)   returns (RegisterEngineResponse);
  rpc DeregisterEngine (DeregisterEngineRequest)  returns (DeregisterEngineResponse);
  rpc Heartbeat        (HeartbeatRequest)          returns (HeartbeatResponse);
}

// ── ManagerService ────────────────────────────────────────────────────────

service ManagerService {
  // Engine lifecycle
  rpc RegisterEngine    (RegisterEngineRequest)    returns (RegisterEngineResponse);
  rpc DeregisterEngine  (DeregisterEngineRequest)  returns (DeregisterEngineResponse);
  rpc Heartbeat         (HeartbeatRequest)         returns (HeartbeatResponse);
  rpc ListEngines       (ListEnginesRequest)       returns (ListEnginesResponse);

  // Routing table
  rpc GetRoutingTable   (GetRoutingTableRequest)   returns (GetRoutingTableResponse);
  rpc UpsertRoutingRule (RoutingRule)              returns (UpsertRoutingRuleResponse);
  rpc DeleteRoutingRule (DeleteRoutingRuleRequest) returns (DeleteRoutingRuleResponse);

  // Manager discovery
  rpc ListManagers      (ListManagersRequest)      returns (ListManagersResponse);

  // Schemas
  rpc GetSchema         (GetSchemaRequest)         returns (GetSchemaResponse);

  // Secrets
  rpc SetSecret         (SetSecretRequest)         returns (SetSecretResponse);
  rpc DeleteSecret      (DeleteSecretRequest)      returns (DeleteSecretResponse);
  rpc ListSecrets       (ListSecretsRequest)       returns (ListSecretsResponse);

  // Schedules
  rpc UpsertSchedule    (UpsertScheduleRequest)    returns (UpsertScheduleResponse);
  rpc DeleteSchedule    (DeleteScheduleRequest)    returns (DeleteScheduleResponse);
  rpc ListSchedules     (ListSchedulesRequest)     returns (ListSchedulesResponse);
}
