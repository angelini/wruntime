[default]
job = "build"
summary = true

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--all-features", "--color", "always", "--", "-D", "warnings"]
need_stdout = false

[jobs.test]
command = ["cargo", "test", "--color", "always"]
need_stdout = true

[jobs.build]
command = ["bash", "-c", "cargo build --color=always && just build-ecommerce && just build-codegen && just build-stockmarket"]
need_stdout = true
watch = ["examples/ecommerce", "examples/codegen", "examples/stockmarket"]

[jobs.build-ecommerce]
command = ["just", "build-ecommerce"]
need_stdout = true
watch = ["examples/ecommerce"]

[jobs.build-codegen]
command = ["just", "build-codegen"]
need_stdout = true
watch = ["examples/codegen"]

[jobs.build-stockmarket]
command = ["just", "build-stockmarket"]
need_stdout = true
watch = ["examples/stockmarket"]

[keybindings]
c = "job:check"
l = "job:clippy"
t = "job:test"
b = "job:build"
