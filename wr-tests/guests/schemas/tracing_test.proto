syntax = "proto3";
package test;

service TracingTestService {
  rpc StartSpan      (StartSpanRequest)      returns (StartSpanResponse);
  rpc SpanAttributes (SpanAttributesRequest) returns (SpanAttributesResponse);
  rpc SpanEvent      (SpanEventRequest)      returns (SpanEventResponse);
  rpc SpanError      (SpanErrorRequest)      returns (SpanErrorResponse);
  rpc NestedSpans    (NestedSpansRequest)    returns (NestedSpansResponse);
}

message StartSpanRequest {
  string name = 1;
  map<string, string> attrs = 2;
}
message StartSpanResponse {
  bool ok = 1;
}

message SpanAttributesRequest {
  string span_name = 1;
  map<string, string> attrs = 2;
}
message SpanAttributesResponse {
  bool ok = 1;
}

message SpanEventRequest {
  string span_name  = 1;
  string event_name = 2;
  map<string, string> event_attrs = 3;
}
message SpanEventResponse {
  bool ok = 1;
}

message SpanErrorRequest {
  string span_name = 1;
  string message   = 2;
}
message SpanErrorResponse {
  bool ok = 1;
}

message NestedSpansRequest {
  string outer_name = 1;
  string inner_name = 2;
}
message NestedSpansResponse {
  bool ok = 1;
}
