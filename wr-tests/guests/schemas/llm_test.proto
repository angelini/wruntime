syntax = "proto3";
package test;

// ── Complete ────────────────────────────────────────────────────────────────

message CompleteRequest {
  string model = 1;
  string system = 2;
  string user_message = 3;
  uint32 max_tokens = 4;
}

message CompleteResponse {
  string text = 1;
  string stop_reason = 2;
  uint32 input_tokens = 3;
  uint32 output_tokens = 4;
}

// ── CompleteText ────────────────────────────────────────────────────────────

message CompleteTextRequest {
  string user_message = 1;
}

message CompleteTextResponse {
  string text = 1;
}

// ── ToolUse ─────────────────────────────────────────────────────────────────

message ToolUseRequest {
  string user_message = 1;
  string tool_name = 2;
  string tool_description = 3;
  string tool_schema = 4;
}

message ToolUseResponse {
  string tool_name = 1;
  string tool_id = 2;
  string tool_input = 3;
  string stop_reason = 4;
}

// ── Error ───────────────────────────────────────────────────────────────────

message LlmErrorRequest {
  string user_message = 1;
}

message LlmErrorResponse {
  string error_kind = 1;
  string error_message = 2;
}

// ── Stream ──────────────────────────────────────────────────────────────────

message StreamRequest {
  string user_message = 1;
  bool with_tools = 2;   // when true, attach a tool def -> host must pre-reject
}

message StreamResponse {
  string text = 1;
  uint32 chunk_count = 2;          // number of text-delta events observed
  repeated string events = 3;      // ordered event-kind tags: "text-delta" | "usage" | "stop"
  uint32 input_tokens = 4;
  uint32 output_tokens = 5;
  string stop_reason = 6;
  bool usage_mid_none = 7;         // stream.usage() was None after the first text-delta
  bool usage_present_after = 8;    // stream.usage() was Some after next() returned None
  string error_kind = 9;           // set on error: "invalid-request"|"auth"|"rate-limited"|"api"; "" if ok
  string error_message = 10;
}

message AllocStreamsRequest {
  uint32 initial    = 1;
  uint32 drop_count = 2;
  uint32 additional = 3;
}
message AllocStreamsResponse {
  uint32 held          = 1;
  bool   hit_cap       = 2;  // whether a cap error (LlmError::Api) was observed
  string error_kind    = 3;  // "api" / "other" / ""
  string error_message = 4;
}

service LlmTestService {
  rpc Complete(CompleteRequest) returns (CompleteResponse);
  rpc CompleteText(CompleteTextRequest) returns (CompleteTextResponse);
  rpc ToolUse(ToolUseRequest) returns (ToolUseResponse);
  rpc Error(LlmErrorRequest) returns (LlmErrorResponse);
  rpc Stream(StreamRequest) returns (StreamResponse);
  rpc AllocStreams(AllocStreamsRequest) returns (AllocStreamsResponse);
}
