syntax = "proto3";
package test;

service DbTestService {
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);
  rpc Query (QueryRequest) returns (QueryResponse);
  rpc QueryTypes (QueryTypesRequest) returns (QueryTypesResponse);
  rpc TransactionCommit (TransactionCommitRequest) returns (TransactionCommitResponse);
  rpc TransactionRollback (TransactionRollbackRequest) returns (TransactionRollbackResponse);
  rpc TransactionDrop (TransactionDropRequest) returns (TransactionDropResponse);
  rpc TransactionAfterComplete (TransactionAfterCompleteRequest) returns (TransactionAfterCompleteResponse);
  rpc Error (ErrorRequest) returns (ErrorResponse);
  rpc QueryStream (QueryStreamRequest) returns (QueryStreamResponse);
  rpc QueryStreamDrop (QueryStreamDropRequest) returns (QueryStreamDropResponse);
  rpc AllocTransactions (AllocResourcesRequest) returns (AllocResourcesResponse);
  rpc AllocCursors (AllocResourcesRequest) returns (AllocResourcesResponse);
}

message DbParam {
  oneof value {
    bool null_marker = 1;
    string text = 2;
    sint32 int4 = 3;
    sint64 int8 = 4;
    bool boolean = 5;
    double float8 = 6;
    string numeric = 7;
  }
}

message DbColumn {
  string name = 1;
  string type_name = 2;
  oneof value {
    bool null_marker = 3;
    bool boolean = 4;
    sint64 integer = 5;
    double float = 6;
    string text = 7;
    bytes bytea = 8;
    string display = 9;
  }
}

message ExecuteRequest { string sql = 1; repeated DbParam params = 2; }
message ExecuteResponse { uint64 affected = 1; }
message QueryRequest { string sql = 1; repeated DbParam params = 2; }
message QueryRow { repeated DbColumn columns = 1; }
message QueryResponse { repeated QueryRow rows = 1; }
message QueryTypesRequest {}
message QueryTypesResponse { QueryRow row = 1; }
message TransactionCommitRequest { string table_name = 1; }
message TransactionCommitResponse { int64 count = 1; }
message TransactionRollbackRequest { string table_name = 1; }
message TransactionRollbackResponse { int64 count = 1; }
message TransactionDropRequest { string table_name = 1; }
message TransactionDropResponse { int64 count = 1; }
message TransactionAfterCompleteRequest { bool rollback = 1; string operation = 2; }
message TransactionAfterCompleteResponse { string error_message = 1; }
message ErrorRequest { string sql = 1; repeated DbParam params = 2; }
message ErrorResponse { string error_kind = 1; string error_message = 2; }
message QueryStreamRequest { string sql = 1; repeated DbParam params = 2; uint32 batch_size = 3; }
message QueryStreamResponse { repeated QueryRow rows = 1; uint32 batch_count = 2; }
message QueryStreamDropRequest { string sql = 1; uint32 fetch_count = 2; }
message QueryStreamDropResponse { uint32 fetched = 1; }
message AllocResourcesRequest { uint32 initial = 1; uint32 drop_count = 2; uint32 additional = 3; }
message AllocResourcesResponse { uint32 held = 1; bool hit_cap = 2; string error_kind = 3; string error_message = 4; }
