syntax = "proto3";
package test;

service HttpTestService {
  rpc Egress (EgressRequest) returns (EgressResponse);
  rpc Echo   (EchoRequest)   returns (EchoResponse);
}

message EgressRequest {
  string authority = 1;
  string path      = 2;
  bytes  body      = 3;
}
message EgressResponse {
  uint32 status = 1;
  string body   = 2;
}

message EchoRequest {
  string message = 1;
}
message EchoResponse {
  string message = 1;
}
